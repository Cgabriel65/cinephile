services:
  app:
    build:
      context: . 
      dockerfile: Dockerfile

    #Nome do container(opcional)
    container_name: containerFront

    ports:
      #Mapeamento de portas   [PORTA_HOST(4200)]:[PORTA_CONTAINER]
      - "${APP_PORT}:80"

    # Garantir que a API arranca antes da aplicação
    depends_on:
      - api #serviço

    environment:
      API_URL: ${API_URL}


  # Serviço responsável pela API mock
  api:
    # Imagem base que contém Node.js
    image: node:20-alpine
    container_name: apiContainer

    # Diretório de trabalho dentro do container
    working_dir: /data  

    # Estas variáveis vêm do ficheiro .env
    environment:
      JSON_SERVER_WATCH: ${JSON_SERVER_WATCH} 
      #Variável usada pelo json-server para "watch mode"

    # Comando executado quando o container inicia
    # Aqui queremos instalar json-server e arrancar uma API mock

    command: >
      sh -c "npm install -g json-server && json-server --host 0.0.0.0 --port 3000 db.json"

    
    ports: 
      - "${API_PORT}:3000"

    # Volume para montar o ficheiro db.json dentro do container
    volumes:
      - ./mock-api/db.json:/data/db.json

    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://api:3000"]
      interval: 10s
      timeout: 5s
      retries: 5
    